name: Bug Report
about: Report something that isn't working correctly
title: ''
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What's broken? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can this be reproduced?
      placeholder: |
        1. ...
        2. ...
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output.
      render: shell
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      description: Any extra context or information.
    validations:
      required: false
