server:
    verbosity: 1
    interface: 0.0.0.0
    port: 5335
    do-ip4: yes
    do-ip6: no
    do-udp: yes
    do-tcp: yes
    # Allow all internal Docker networks
    access-control: 0.0.0.0/0 allow
    # Buffer sizes - use system defaults on Pi
    so-rcvbuf: 0
    so-sndbuf: 0
    # Hardening
    hide-identity: yes
    hide-version: yes
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-below-nxdomain: yes
    use-caps-for-id: yes
    val-clean-additional: yes
    # Privacy
    qname-minimisation: yes
    aggressive-nsec: yes
    # Performance - sensible defaults for Pi
    prefetch: yes
    prefetch-key: yes
    num-threads: 2
    cache-min-ttl: 300
    cache-max-ttl: 86400
    # Block private IP space from being returned in public DNS
    # (172.16.0.0/12 removed - conflicts with Docker bridge network)
    private-address: 192.168.0.0/16
    private-address: 169.254.0.0/16
    private-address: 10.0.0.0/8
    private-domain: "inverselink.com"
    private-domain: "pawelprotas.com"
    private-domain: "asusrouter.com"
    private-domain: "us-west-2.elb.amazonaws.com"
